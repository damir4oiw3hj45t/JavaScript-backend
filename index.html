<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AI Assistant</title>

<style>
body {
    font-family: sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.chat-wrap {
    width: 400px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
}
.header {
    background: #007bff;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}
#chat-window {
    height: 400px;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.msg {
    padding: 10px 14px;
    border-radius: 18px;
    max-width: 80%;
}
.user {
    background: #007bff;
    color: white;
    align-self: flex-end;
}
.ai {
    background: #e9ecef;
}
.input-bar {
    display: flex;
    padding: 15px;
}
input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ddd;
}
button {
    margin-left: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: 20px;
    background: #28a745;
    color: white;
}
</style>
</head>

<body>

<div class="chat-wrap">
    <div class="header">My AI Assistant</div>

    <div id="chat-window">
        <div class="msg ai">Hello! Ask me anything 👀</div>
    </div>

    <div class="input-bar">
        <input id="user-msg" placeholder="Type here..." />
        <button onclick="askAI()">Send</button>
    </div>
</div>

<script>
async function askAI() {
    const input = document.getElementById("user-msg");
    const chat = document.getElementById("chat-window");
    const text = input.value.trim();

    if (!text) return;

    // show user msg
    chat.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";
    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await fetch("http://localhost:3000/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: text })
        });

        const data = await response.json();

        chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;
        chat.scrollTop = chat.scrollHeight;

    } catch (err) {
        chat.innerHTML += `<div class="msg ai" style="color:red;">Error connecting to AI</div>`;
    }
}
</script>

</body>
</html>
